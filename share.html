<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Memento</title>
<meta name="description" content="A shared card from Memento.">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<style>
  /* Standalone share viewer: no app code, one card on near-black glass. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #04040a;
    color: rgba(255,255,255,0.92);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 28px 18px calc(28px + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }
  .beam {
    position: fixed; top: -20vh; left: -10vw; width: 60vw; height: 90vh;
    background: radial-gradient(ellipse at 30% 20%, rgba(123,97,255,0.14), transparent 65%);
    pointer-events: none; filter: blur(40px);
  }
  .card {
    width: min(440px, 92vw);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.6);
    background: rgba(255,255,255,0.04);
  }
  .card img { display: block; width: 100%; height: auto; }
  .state { font-size: 0.95rem; color: rgba(255,255,255,0.55); text-align: center; line-height: 1.5; max-width: 36ch; }
  .foot { display: flex; align-items: center; gap: 9px; text-decoration: none; color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 0.02em; }
  .foot img { width: 18px; height: 18px; border-radius: 4px; }
  .foot:hover { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<div class="beam" aria-hidden="true"></div>
<div id="slot" class="state">Opening the card&hellip;</div>
<a class="foot" href="index.html"><img src="icons/icon.svg" alt=""><span>Made with Memento</span></a>
<script>
(function () {
  var SUPABASE_URL = 'https://lipuxymlsowdrbummqxw.supabase.co';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpcHV4eW1sc293ZHJidW1tcXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjI1MDIsImV4cCI6MjA5NjY5ODUwMn0.mbTRo2CFz9q9dtQTzgI3655f6KIY09fUyCqI1F0RkyU';
  var slot = document.getElementById('slot');
  var id = '';
  try { id = new URLSearchParams(location.search).get('id') || ''; } catch (e) {}
  if (!/^[a-f0-9]{32}$/.test(id)) { slot.textContent = 'This link is not a Memento card.'; return; }
  fetch(SUPABASE_URL + '/functions/v1/share-card?id=' + encodeURIComponent(id), {
    headers: { 'Content-Type': 'application/json', 'apikey': ANON, 'Authorization': 'Bearer ' + ANON },
  }).then(function (r) { return r.ok ? r.json() : null; }).then(function (result) {
    var payload = result && result.payload;
    if (!payload || !payload.img) { slot.textContent = 'This card is gone. The person who shared it may have removed it.'; return; }
    var wrap = document.createElement('div');
    wrap.className = 'card';
    var img = document.createElement('img');
    img.alt = 'A Memento card';
    img.src = String(payload.img);
    wrap.appendChild(img);
    slot.replaceWith(wrap);
  }).catch(function () { slot.textContent = 'Could not load this card. Try again in a moment.'; });
})();
</script>
</body>
</html>
