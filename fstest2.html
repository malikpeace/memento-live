<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Memento full-screen test 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000;
    font-family: -apple-system, system-ui, sans-serif; }

  /* Five vertical bands, each spanning full WIDTH/5, each made full-HEIGHT by a
     DIFFERENT technique. Whichever band's color reaches the very bottom edge of
     the screen (below the home indicator) is the technique that fills the
     screen on this device. Each is labeled at its own bottom. */
  .band { position: fixed; top: 0; width: 20vw; }
  .b1 { left: 0vw;  height: 100vh;  background: #34c759; }  /* green  */
  .b2 { left: 20vw; height: 100dvh; background: #ffd60a; }  /* yellow */
  .b3 { left: 40vw; height: 100lvh; background: #00e5ff; }  /* cyan   */
  .b4 { left: 60vw; height: 100svh; background: #ff3b30; }  /* red    */
  .b5 { left: 80vw; top: 0;         background: #ff2bbf; }  /* magenta: JS screen.height */

  .lab { position: absolute; bottom: 0; left: 0; right: 0; color: #000;
    font-size: 11px; font-weight: 800; text-align: center; padding: 6px 0 calc(6px + env(safe-area-inset-bottom,0px));
    background: rgba(255,255,255,0.55); }

  /* Thin pure-black line exactly at bottom:0 — marks where plain fixed bottom:0
     lands, so you can see how far short it is of the real edge. */
  .insetMark { position: fixed; left: 0; right: 0; bottom: 0; height: 3px;
    background: #000; z-index: 50; }

  .info { position: fixed; top: 120px; left: 0; right: 0; z-index: 40;
    text-align: center; color: #fff; font-size: 13px; line-height: 1.7;
    text-shadow: 0 1px 4px #000; padding: 0 16px; }
</style>
</head>
<body>
  <div class="band b1"><div class="lab">100vh</div></div>
  <div class="band b2"><div class="lab">100dvh</div></div>
  <div class="band b3"><div class="lab">100lvh</div></div>
  <div class="band b4"><div class="lab">100svh</div></div>
  <div class="band b5" id="b5"><div class="lab">JS&nbsp;screen.h</div></div>
  <div class="insetMark"></div>
  <div class="info" id="info"></div>
  <script>
    var b5 = document.getElementById('b5');
    function render() {
      b5.style.height = (window.screen ? window.screen.height : window.innerHeight) + 'px';
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;bottom:0;left:0;width:0;height:env(safe-area-inset-bottom,0px);';
      document.body.appendChild(probe);
      var sab = probe.getBoundingClientRect().height; probe.remove();
      document.getElementById('info').innerHTML =
        'innerH ' + window.innerHeight + ' &middot; screen.h ' +
        (window.screen ? window.screen.height : '?') + ' &middot; safe-b ' +
        Math.round(sab) + 'px<br>Which color band reaches the very bottom edge?';
    }
    render();
    addEventListener('resize', render);
    addEventListener('orientationchange', function () { setTimeout(render, 300); });
  </script>
</body>
</html>
