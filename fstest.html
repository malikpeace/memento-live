<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Memento full-screen test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; color: #fff;
    font-family: -apple-system, system-ui, sans-serif; }

  /* Layer A: a fixed full-screen gradient using inset:0 — the SAME technique as
     the app's global .ambient background. If this leaves a black strip at the
     bottom on your phone, that is the bug, reproduced with zero app code. */
  .fill { position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(180deg, #1a2f8b 0%, #6a2bb0 48%, #c23b78 100%); }

  /* Bright edge markers. If the screen truly fills, you see GREEN touching the
     very top and the very bottom edges with NO black beyond them. */
  .edge { position: fixed; left: 0; right: 0; height: 12px; z-index: 5; }
  .edge-top    { top: 0;    background: #00ff66; }
  .edge-bottom { bottom: 0; background: #00ff66; }

  /* A second marker BLED below the safe area. If the green bottom marker sits
     above a black strip but this magenta one reaches the real bottom edge, then
     the bleed technique is the fix. */
  .edge-bled { position: fixed; left: 0; right: 0; height: 12px; z-index: 4;
    bottom: calc(-1 * env(safe-area-inset-bottom, 0px)); background: #ff2bbf; }

  .info { position: fixed; inset: 0; z-index: 6; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    font-size: 17px; line-height: 1.9; pointer-events: none; }
  .info b { font-size: 22px; display: block; margin-bottom: 10px; }
  .legend { margin-top: 18px; font-size: 14px; opacity: 0.92; }
  code { background: rgba(0,0,0,0.45); padding: 2px 9px; border-radius: 7px;
    font-size: 16px; }
  .dot { display: inline-block; width: 11px; height: 11px; border-radius: 3px;
    vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>
  <div class="fill"></div>
  <div class="edge edge-top"></div>
  <div class="edge-bled"></div>
  <div class="edge edge-bottom"></div>
  <div class="info" id="info"></div>
  <script>
    function px(n) { return Math.round(n) + 'px'; }
    function render() {
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;bottom:0;left:0;width:0;height:env(safe-area-inset-bottom,0px);';
      document.body.appendChild(probe);
      var sab = probe.getBoundingClientRect().height;
      probe.remove();
      document.getElementById('info').innerHTML =
        '<b>Memento full-screen test</b>' +
        'safe-area-bottom: <code>' + px(sab) + '</code><br>' +
        'innerHeight: <code>' + window.innerHeight + '</code><br>' +
        'screen.height: <code>' + (window.screen ? window.screen.height : '?') + '</code><br>' +
        'dpr: <code>' + (window.devicePixelRatio || 1) + '</code>' +
        '<div class="legend">' +
        '<span class="dot" style="background:#00ff66"></span>GREEN = inset:0 edges (top + bottom)<br>' +
        '<span class="dot" style="background:#ff2bbf"></span>MAGENTA = bled below safe area</div>';
    }
    render();
    window.addEventListener('resize', render);
    window.addEventListener('orientationchange', function () { setTimeout(render, 300); });
  </script>
</body>
</html>
