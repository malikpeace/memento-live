<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Memento brand mark (Malik's M-crown). TWO colours only: white rounded square +
       the black M filling it. No frame, no extra layers. SINGLE SOURCE: replace this
       file and re-export the PNG sizes (180/192/512) to update the favicon, home-screen
