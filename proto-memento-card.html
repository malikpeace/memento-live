<!DOCTYPE html>
<!-- ============================================================================
  MEMENTO CARD MORPH PROTOTYPE (standalone sandbox)
  A faithful replica of the real Day Card (the Memento mobile hero) with a new
  liquid color-morph layer: purple = clarity, white = action, green = consistency.
  Balanced tri-color at full progress. Drag the sliders / hit a preset to preview.
  NOT wired into the app. Pure look-and-feel. Open this file directly.
============================================================================= -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Memento card morph prototype</title>
<style>
  :root {
    --ink: 255, 255, 255;
    --r-card: 16px;
    --success: #30D158; --success-rgb: 48, 209, 88;
    --color-clarity: #5550CC;
    --text-hi: rgba(var(--ink), 0.92);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Geist", system-ui, sans-serif;
    --bx: 1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: var(--font); color: #fff;
    min-height: 100dvh;
    background:
      radial-gradient(120% 80% at 50% 22%, rgba(95, 88, 222, 0.10), transparent 58%),
      #05050b;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 30px; padding: 40px 20px;
  }

  /* ── Drifting ambient orbs behind the card (the scene breathing) ───────── */
  .scene-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(58px); mix-blend-mode: screen; will-change: transform; }
  .orb-1 { width: 58vmin; height: 58vmin; opacity: 0.72; background: radial-gradient(circle, rgba(150,116,255,0.72), transparent 68%); top: -20%; left: -6%; animation: orbA calc(22s / var(--speed,1)) ease-in-out infinite; }
  .orb-2 { width: 54vmin; height: 54vmin; opacity: 0.64; background: radial-gradient(circle, rgba(56,232,150,0.64), transparent 68%); bottom: -20%; right: -4%; animation: orbB calc(26s / var(--speed,1)) ease-in-out infinite; }
  .orb-3 { width: 46vmin; height: 46vmin; opacity: 0.52; background: radial-gradient(circle, rgba(120,150,255,0.52), transparent 70%); top: 40%; right: -22%; animation: orbC calc(30s / var(--speed,1)) ease-in-out infinite; }
  .orb-4 { width: 42vmin; height: 42vmin; opacity: 0.42; background: radial-gradient(circle, rgba(180,210,255,0.42), transparent 70%); bottom: 6%; left: -20%; animation: orbD calc(28s / var(--speed,1)) ease-in-out infinite; }
  @keyframes orbA { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(22vmin, 16vmin) scale(1.14) } }
  @keyframes orbB { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(-20vmin, -15vmin) scale(1.12) } }
  @keyframes orbC { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(-18vmin, 18vmin) scale(0.88) } }
  @keyframes orbD { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(20vmin, -16vmin) scale(1.18) } }
  .daycard-wrap, .panel { position: relative; z-index: 1; }

  /* ── Day Card asset (replicated from css/dashboard.css:2675-2813) ──────── */
  .daycard-wrap { position: relative; }
  .daycard-wrap__aura {
    position: absolute; left: 50%; top: 50%;
    width: 150%; height: 120%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    background: radial-gradient(closest-side,
      rgba(215, 220, 250, 0.16), rgba(150, 160, 235, 0.06) 48%, transparent 72%);
    filter: blur(28px) brightness(calc(0.7 + 1.7 * var(--glow, 0.4)));
    animation: dayCardBreath calc(7s / var(--speed,1)) ease-in-out infinite alternate;
  }
  @keyframes dayCardBreath {
    0%   { opacity: 0.62; transform: translate(-54%, -52%) scale(0.97); }
    50%  { opacity: 1;    transform: translate(-46%, -48%) scale(1.05); }
    100% { opacity: 0.62; transform: translate(-54%, -52%) scale(0.97); }
  }
  .daycard-ns {
    position: relative;
    width: min(86vw, 330px);
    min-height: min(64vh, 520px);
    padding: 18px 18px 16px;
    display: flex; flex-direction: column;
    border-radius: var(--r-card);
    background: linear-gradient(165deg,
      rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.015) 48%, rgba(255, 255, 255, 0.05));
    border: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.22),
      0 0 44px rgba(200, 210, 255, 0.10),
      0 26px 60px rgba(0, 0, 0, 0.45);
    -webkit-backdrop-filter: blur(calc(5px * var(--bx, 1))) saturate(1.25);
    backdrop-filter: blur(calc(5px * var(--bx, 1))) saturate(1.25);
    overflow: hidden;
    transform: perspective(900px) rotateX(var(--dc-rx, 0deg)) rotateY(var(--dc-ry, 0deg));
    transition: transform 0.18s ease-out;
    will-change: transform;
    /* Subtle floor reflection: a short, quickly-fading mirror of the card. */
    -webkit-box-reflect: below 3px linear-gradient(to bottom, rgba(0,0,0,0.30), rgba(0,0,0,0) 24%);
  }
  /* room for the reflection so it does not crowd the controls */
  .daycard-wrap { margin-bottom: 56px; }
  /* Liquid-glass rim: a masked gradient ring (NOT a border). */
  .daycard-ns::before {
    content: ""; position: absolute; inset: 0;
    border-radius: inherit; padding: 1.5px;
    background: linear-gradient(140deg,
      rgba(255, 255, 255, 0.60), rgba(255, 255, 255, 0.10) 26%,
      rgba(255, 255, 255, 0.02) 52%,
      rgba(255, 255, 255, 0.22) 80%, rgba(255, 255, 255, 0.45));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
    pointer-events: none; z-index: 2;
  }

  /* ── Burning energy ring: bright only at the TOP-LEFT and BOTTOM-RIGHT
     corners (the diagonal), fading to nothing at the other two, so it gives
     the card dimension instead of a flat square outline. Glimmers in place.
     Intensity = var(--ring). ────────────────────────────────────────────── */
  .daycard-ns__burn {
    content: ""; position: absolute; inset: 0;
    border-radius: inherit; padding: 2px; z-index: 3; pointer-events: none;
    opacity: var(--ring, 0);
    background: conic-gradient(from 0deg,
      rgba(212,224,255,0.16) 0deg,
      rgba(212,224,255,0)    48deg,    /* top-right: off */
      rgba(234,240,255,0.95) 135deg,   /* bottom-right: bright */
      rgba(212,224,255,0.16) 180deg,
      rgba(212,224,255,0)    228deg,   /* bottom-left: off */
      rgba(234,240,255,0.95) 315deg,   /* top-left: bright */
      rgba(212,224,255,0.16) 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
    animation: ringGlimmer 3.6s ease-in-out infinite;
  }
  @keyframes ringGlimmer {
    0%,100% { filter: drop-shadow(0 0 4px rgba(200,212,255,0.5)); }
    50%     { filter: drop-shadow(0 0 12px rgba(226,234,255,1)); }
  }

  /* ── Liquid color layer: soft blurred blobs (purple/white/green) ───────── */
  /* Bigger + brighter than v1 so the color fills the card, with a gentle slow
     drift + breathe so it feels alive without being frantic. */
  .daycard-ns__liquid {
    position: absolute; inset: -28%; pointer-events: none;
    filter: blur(30px) saturate(var(--sat, 1.5));
  }
  .daycard-ns__liquid .blob {
    position: absolute; border-radius: 50%;
    mix-blend-mode: screen; will-change: transform;
    transition: opacity 0.6s ease;
  }
  .blob.b1 { width: 94%; height: 72%; left: -12%; top: -14%;
    background: radial-gradient(circle, rgba(150,116,255,1.0), transparent 66%);
    opacity: var(--clar); }
  .blob.b2 { width: 74%; height: 60%; left: 14%; top: 22%;
    background: radial-gradient(circle, rgba(232,236,255,0.95), transparent 64%);
    opacity: calc(var(--act) * 0.68); }
  .blob.b3 { width: 98%; height: 76%; right: -14%; bottom: -16%;
    background: radial-gradient(circle, rgba(56,236,150,1.0), transparent 64%);
    opacity: var(--cons); }
  .blob.b4 { width: 72%; height: 58%; left: 0%; bottom: 4%;
    background: radial-gradient(circle, rgba(128,150,255,0.85), transparent 66%);
    opacity: var(--mix); }
  .blob.b5 { width: 66%; height: 54%; right: 4%; top: 28%;
    background: radial-gradient(circle, rgba(120,255,190,0.7), transparent 68%);
    opacity: calc(var(--cons) * 0.5); }
  .blob.b6 { width: 80%; height: 62%; right: -12%; top: 6%;
    background: radial-gradient(circle, rgba(255,72,86,1.0), transparent 66%);
    opacity: var(--red); }
  /* 3-point wandering paths (not just back-and-forth) so the color visibly
     drifts around inside the card, calmly. */
  @keyframes dl1 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(22%,16%) scale(1.12) } 66% { transform: translate(9%,26%) scale(1.05) } }
  @keyframes dl2 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(-19%,21%) scale(1.08) } 66% { transform: translate(-24%,6%) scale(1.12) } }
  @keyframes dl3 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(-21%,-15%) scale(1.1) } 66% { transform: translate(-6%,-25%) scale(1.04) } }
  @keyframes dl4 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(24%,-17%) scale(1.14) } 66% { transform: translate(12%,-27%) scale(1.06) } }
  @keyframes dl5 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(-18%,16%) scale(0.92) } 66% { transform: translate(-26%,-8%) scale(1.08) } }
  @keyframes dl6 { 0%,100% { transform: translate(0,0) scale(1) } 33% { transform: translate(-22%,18%) scale(1.1) } 66% { transform: translate(-8%,28%) scale(1.04) } }

  /* Iridescence + sheen (replicated, sit above the color) */
  .daycard-ns__iri {
    position: absolute; inset: -30%; pointer-events: none;
    background: conic-gradient(from 210deg at 50% 40%,
      rgba(220, 225, 255, 0.10), rgba(167, 139, 250, 0.07),
      rgba(94, 162, 247, 0.05), rgba(235, 235, 245, 0.09),
      rgba(220, 225, 255, 0.10));
    filter: blur(22px); mix-blend-mode: screen; opacity: 0.55;
  }
  .daycard-ns__sheen {
    position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: radial-gradient(circle at 30% 18%, rgba(255, 255, 255, 0.13), transparent 55%);
    mix-blend-mode: screen;
  }
  /* The mark + name sit ABOVE the moving color (z-index 4, over the blobs and
     the rim) and are part of the card, so they tilt with it. */
  .daycard-ns__body {
    position: relative; z-index: 4; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 18px 2px;
  }
  /* Embedded, embossed mark: a frosted translucent fill that reads over any
     color, with a bright top edge + dark lower edge so it looks pressed into
     the glass and catches the light. */
  .daycard-ns__emblem {
    width: 116px; height: 116px;
    fill: rgba(255, 255, 255, 0.2);
    filter:
      drop-shadow(0 1.5px 0.5px rgba(255, 255, 255, 0.75))   /* bright lower bevel */
      drop-shadow(0 -1.5px 1px rgba(0, 0, 0, 0.6))           /* dark upper bevel */
      drop-shadow(0 0 6px rgba(0, 0, 0, 0.5))                /* dark halo: reads on bright areas */
      drop-shadow(0 0 13px rgba(255, 255, 255, 0.16));       /* soft sheen: reads on dark areas */
  }
  .daycard-ns__foot {
    position: relative; z-index: 4; display: flex; align-items: center; justify-content: flex-end;
    gap: 10px; min-height: 26px;
  }
  .daycard-ns__name {
    position: absolute; left: -3px; bottom: -3px;
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(var(--ink), 0.34); text-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;
  }

  /* ── Prototype-only controls (never ship) ──────────────────────────────── */
  .panel { width: min(92vw, 360px); display: flex; flex-direction: column; gap: 16px; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .presets button {
    font: inherit; font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.82);
    background: rgba(255,255,255,0.05); border: none; border-radius: 10px;
    padding: 9px 13px; cursor: pointer; transition: background 0.15s, transform 0.12s;
  }
  .presets button:hover { background: rgba(255,255,255,0.10); }
  .presets button:active { transform: scale(0.97); }
  .presets button.is-active { background: #fff; color: #0a0a0f; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row label { font-size: 0.82rem; color: rgba(255,255,255,0.55); width: 92px; letter-spacing: 0.01em; }
  .row .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .row input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.14); outline: none; }
  .row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }
  .row input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border: none; border-radius: 50%; background: #fff; cursor: pointer; }
  .row .out { font-size: 0.8rem; font-weight: 500; width: 30px; text-align: right; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
  .hint { font-size: 0.72rem; color: rgba(255,255,255,0.32); text-align: center; letter-spacing: 0.02em; }

  @media (prefers-reduced-motion: reduce) {
    .daycard-wrap__aura, .blob, .orb { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="scene-orbs" aria-hidden="true">
    <span class="orb orb-1"></span><span class="orb orb-2"></span><span class="orb orb-3"></span><span class="orb orb-4"></span>
  </div>
  <div class="daycard-wrap">
    <span class="daycard-wrap__aura" aria-hidden="true"></span>
    <div class="daycard-ns" id="card" style="--clar:0; --act:0; --cons:0; --mix:0; --red:0;">
      <span class="daycard-ns__liquid" aria-hidden="true">
        <i class="blob b1"></i><i class="blob b2"></i><i class="blob b3"></i><i class="blob b4"></i><i class="blob b5"></i><i class="blob b6"></i>
      </span>
      <span class="daycard-ns__iri" aria-hidden="true"></span>
      <span class="daycard-ns__sheen" aria-hidden="true"></span>
      <span class="daycard-ns__burn" aria-hidden="true"></span>
      <div class="daycard-ns__body">
        <svg class="daycard-ns__emblem" viewBox="0 0 512 512" aria-hidden="true"><path d="M150 146 L256 252 L362 146 L362 366 L150 366 Z"/></svg>
      </div>
      <div class="daycard-ns__foot">
        <span class="daycard-ns__name">Malik</span>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="presets" id="presets">
      <button data-p="0,0,0">Day one</button>
      <button data-p="85,10,0">Clarity found</button>
      <button data-p="85,75,25">Taking action</button>
      <button data-p="80,70,80">Consistent</button>
      <button data-p="95,90,100">Fully evolved</button>
    </div>
    <div class="row"><label>Clarity</label><span class="dot" style="background:#9674ff"></span><input id="s1" type="range" min="0" max="100" value="0" step="1"><span class="out" id="o1">0</span></div>
    <div class="row"><label>Action</label><span class="dot" style="background:#ffffff"></span><input id="s2" type="range" min="0" max="100" value="0" step="1"><span class="out" id="o2">0</span></div>
    <div class="row"><label>Consistency</label><span class="dot" style="background:#38e896"></span><input id="s3" type="range" min="0" max="100" value="0" step="1"><span class="out" id="o3">0</span></div>
    <div class="row"><label>Red (test)</label><span class="dot" style="background:#ff4856"></span><input id="s4" type="range" min="0" max="100" value="0" step="1"><span class="out" id="o4">0</span></div>
    <div class="row"><label>Border glow</label><span class="dot" style="background:#cdd6ff"></span><input id="sGlow" type="range" min="0" max="100" value="40" step="1"><span class="out" id="oGlow">40</span></div>
    <div class="row"><label>Burning ring</label><span class="dot" style="background:#dfe6ff"></span><input id="sRing" type="range" min="0" max="100" value="30" step="1"><span class="out" id="oRing">30</span></div>
    <div class="row"><label>Saturation</label><span class="dot" style="background:#b06cff"></span><input id="sSat" type="range" min="0" max="100" value="50" step="1"><span class="out" id="oSat">1.5x</span></div>
    <div class="row"><label>Motion</label><span class="dot" style="background:#c9c9dc"></span><input id="sMotion" type="range" min="1" max="100" value="20" step="1"><span class="out" id="oMotion">2.0x</span></div>
    <div class="hint">Border glow + saturation + motion (0-10x). Tell me the values you like and I'll bake them in.</div>
  </div>

<script>
(function () {
  var card = document.getElementById('card');
  var s = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
  var o = [document.getElementById('o1'), document.getElementById('o2'), document.getElementById('o3'), document.getElementById('o4')];
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var vars = ['--clar', '--act', '--cons', '--red'];

  var sGlow = document.getElementById('sGlow'), oGlow = document.getElementById('oGlow');
  var sSat = document.getElementById('sSat'), oSat = document.getElementById('oSat');
  var sRing = document.getElementById('sRing'), oRing = document.getElementById('oRing');

  // The card's edge glow: an inner ethereal ring + an outer halo (Border-glow),
  // plus the outward burn of the energy ring (Burning-ring), as box-shadows.
  function renderShadow() {
    var v = s.map(function (el) { return +el.value; });
    var tot = (v[0] + v[1] + v[2] + v[3]) / 400;
    var g = (+sGlow.value) / 100;
    var r = (+sRing.value) / 100;
    var rimA = (0.20 + 0.16 * tot + 0.50 * g).toFixed(3);
    var innerR = Math.round(8 + 30 * g), innerA = (0.04 + 0.26 * g).toFixed(3);
    var haloR = Math.round(34 + 95 * g), haloA = (0.05 + 0.10 * tot + 0.34 * g).toFixed(3);
    // Burning ring's outward glow comes from the TL + BR corners only (offset
    // shadows), matching the on-edge ring, so it reads with dimension.
    var ringOff = (4 + 9 * r).toFixed(1), ringBlur = Math.round(8 + 30 * r), ringA = (0.7 * r).toFixed(3);
    card.style.boxShadow =
      'inset 0 1px 0 rgba(255,255,255,' + rimA + '),' +
      'inset 0 0 ' + innerR + 'px rgba(222,230,255,' + innerA + '),' +
      '-' + ringOff + 'px -' + ringOff + 'px ' + ringBlur + 'px rgba(210,222,255,' + ringA + '),' +
      ringOff + 'px ' + ringOff + 'px ' + ringBlur + 'px rgba(210,222,255,' + ringA + '),' +
      '0 0 ' + haloR + 'px rgba(205,214,255,' + haloA + '),' +
      '0 26px 60px rgba(0,0,0,0.45)';
  }
  function apply() {
    var v = s.map(function (el) { return +el.value; });
    for (var i = 0; i < 4; i++) {
      o[i].textContent = Math.round(v[i]);
      card.style.setProperty(vars[i], (v[i] / 100).toFixed(3));
    }
    // blend blob appears only when clarity AND consistency are both present
    card.style.setProperty('--mix', (Math.min(v[0], v[2]) / 100 * 0.75).toFixed(3));
    renderShadow();
  }
  function applyGlow() {
    var g = (+sGlow.value) / 100;
    document.body.style.setProperty('--glow', g.toFixed(3));
    oGlow.textContent = Math.round(+sGlow.value);
    renderShadow();
  }
  function applySat() {
    var sat = (+sSat.value) / 100 * 3;   // 0 .. 3.0
    document.body.style.setProperty('--sat', sat.toFixed(3));
    oSat.textContent = sat.toFixed(1) + 'x';
  }
  function applyRing() {
    document.body.style.setProperty('--ring', ((+sRing.value) / 100).toFixed(3));
    oRing.textContent = Math.round(+sRing.value);
    renderShadow();
  }
  function clearActive() { presets.querySelectorAll('button').forEach(function (b) { b.classList.remove('is-active'); }); }
  s.forEach(function (el) { el.addEventListener('input', function () { clearActive(); apply(); }); });
  sGlow.addEventListener('input', applyGlow);
  sSat.addEventListener('input', applySat);
  sRing.addEventListener('input', applyRing);

  var presets = document.getElementById('presets');
  presets.addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    var p = b.dataset.p.split(',');
    for (var i = 0; i < 3; i++) { s[i].value = p[i]; }
    clearActive(); b.classList.add('is-active'); apply();
  });

  // Motion: one knob scales every drift animation (--speed). The readout is the
  // multiplier; tell me the number you like and I bake it in.
  var sM = document.getElementById('sMotion'), oM = document.getElementById('oMotion');
  function applyMotion() {
    var sp = (+sM.value) / 10;            // slider 1..100 -> 0.1x .. 10x
    document.body.style.setProperty('--speed', sp.toFixed(3));
    oM.textContent = sp.toFixed(1) + 'x';
  }
  sM.addEventListener('input', applyMotion);
  applyMotion();

  // Pointer tilt: the card leans toward the pointer so the glass reads physical.
  if (!reduce) {
    var reset = function () { card.style.setProperty('--dc-rx', '0deg'); card.style.setProperty('--dc-ry', '0deg'); };
    card.addEventListener('pointermove', function (e) {
      var r = card.getBoundingClientRect(); if (!r.width || !r.height) return;
      var nx = ((e.clientX - r.left) / r.width) * 2 - 1;
      var ny = ((e.clientY - r.top) / r.height) * 2 - 1;
      card.style.setProperty('--dc-rx', (ny * -3.2).toFixed(2) + 'deg');
      card.style.setProperty('--dc-ry', (nx * 4).toFixed(2) + 'deg');
    });
    card.addEventListener('pointerleave', reset);
    card.addEventListener('pointerup', reset);
  }

  // ── Inside colors: continuous RANDOM wander (no looping animation) ────────
  // Each blob eases toward a fresh random target; on arrival it picks another,
  // forever, so the motion never repeats. Pace scales with the Motion slider.
  (function blobWander() {
    if (reduce) return;
    var blobs = [].slice.call(document.querySelectorAll('.daycard-ns__liquid .blob'));
    if (!blobs.length) return;
    var R = function (a, b) { return a + Math.random() * (b - a); };
    var st = blobs.map(function () { return { x: 0, y: 0, sc: 1, tx: R(-20, 20), ty: R(-18, 18), tsc: R(0.92, 1.16) }; });
    function frame() {
      var sp = parseFloat(getComputedStyle(document.body).getPropertyValue('--speed')) || 1;
      var k = Math.min(0.2, 0.011 * sp);
      for (var i = 0; i < blobs.length; i++) {
        var b = st[i];
        b.x += (b.tx - b.x) * k; b.y += (b.ty - b.y) * k; b.sc += (b.tsc - b.sc) * k;
        if (Math.abs(b.tx - b.x) < 1 && Math.abs(b.ty - b.y) < 1) {
          b.tx = R(-22, 22); b.ty = R(-20, 20); b.tsc = R(0.9, 1.18);
        }
        blobs[i].style.transform = 'translate(' + b.x.toFixed(2) + '%,' + b.y.toFixed(2) + '%) scale(' + b.sc.toFixed(3) + ')';
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();

  presets.querySelector('button').classList.add('is-active');
  applyGlow();
  applySat();
  applyRing();
  apply();
})();
</script>
