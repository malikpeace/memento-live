# Deploys the site to GitHub Pages via Actions on every push to main.
# Added 2026-07-02 after GitHub's legacy Pages builder started failing every build
# ("Page build failed") despite clean content; this modern pipeline replaces it.
# NOTE: this file lives in memento-app/.github/ in the SOURCE repo (inert there,
# since workflows only run from a repo's root .github) and is rsynced to the
# memento-live repo root, where it is the ACTIVE deploy pipeline.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
