<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Neutron Star, prototype</title>
<style>
  /* Standalone mockup for the upgraded Clarity Neutron Star (pulsar look: plasma body +
     pulsing polar jets). NOT wired into the app; a baseline to calibrate before porting. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #030308;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  .stage {
    position: relative;
    width: min(88vw, 420px); height: min(88vw, 420px);
    display: flex; align-items: center; justify-content: center;
  }
  canvas { width: 100%; height: 100%; display: block; }
  .cap {
    text-align: center; max-width: 300px;
  }
  .cap h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .cap p { font-size: 0.9rem; line-height: 1.5; color: rgba(232,234,248,0.95); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .chip {
    font: inherit; font-size: 0.82rem; font-weight: 600;
    color: rgba(255,255,255,0.92); background: rgba(255,255,255,0.06);
    border: none; border-radius: 999px; padding: 9px 16px; cursor: pointer;
  }
  .chip.on { background: #fff; color: #0a0a0f; }
</style>
</head>
<body>
  <div class="stage"><canvas id="c"></canvas></div>
  <div class="cap">
    <h1>Discover your Neutron Star</h1>
    <p>Pulsar mockup: plasma body, filament web, pulsing polar jets.</p>
  </div>
  <div class="chips" id="chips">
    <button class="chip on" data-k="beams">Jets</button>
    <button class="chip on" data-k="pulse">Pulse</button>
    <button class="chip on" data-k="filaments">Filaments</button>
    <button class="chip on" data-k="tilt">Tilted axis</button>
  </div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const DPR = Math.min(2, window.devicePixelRatio || 1);
  let W, H, CX, CY, R;
  function size() {
    const s = cv.parentElement.getBoundingClientRect().width;
    cv.width = s * DPR; cv.height = s * DPR;
    W = cv.width; H = cv.height; CX = W / 2; CY = H / 2;
    R = W * 0.19; // star body radius
  }
  size(); addEventListener('resize', size);

  const opts = { beams: true, pulse: true, filaments: true, tilt: true };
  document.getElementById('chips').addEventListener('click', (e) => {
    const b = e.target.closest('.chip'); if (!b) return;
    opts[b.dataset.k] = !opts[b.dataset.k];
    b.classList.toggle('on', opts[b.dataset.k]);
  });

  // Filament web: fixed random arcs across the disc, rotated slowly at draw time.
  const FIL = [];
  let seed = 7;
  const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 26; i++) {
    FIL.push({
      a0: rnd() * Math.PI * 2,           // arc start angle
      r0: 0.15 + rnd() * 0.8,            // start radius (fraction of R)
      a1: rnd() * Math.PI * 2,
      r1: 0.15 + rnd() * 0.85,
      bow: (rnd() - 0.5) * 1.6,          // curvature
      w: 0.8 + rnd() * 2.0,              // line width px
      al: 0.22 + rnd() * 0.34            // alpha
    });
  }

  function cone(len, w0, w1, r, g2, b, alpha) {
    // one soft-edged jet layer pointing +y: gradient along its length AND across its
    // width (via three overlapping strips) so the edges melt into black, no hard lines
    const grad = ctx.createLinearGradient(0, R * 0.05, 0, len);
    grad.addColorStop(0, `rgba(${r},${g2},${b},${alpha})`);
    grad.addColorStop(0.35, `rgba(${r},${g2},${b},${alpha * 0.5})`);
    grad.addColorStop(0.8, `rgba(${r},${g2},${b},${alpha * 0.12})`);
    grad.addColorStop(1, `rgba(${r},${g2},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-w0, R * 0.05);
    ctx.quadraticCurveTo(-w1 * 0.7, len * 0.5, -w1, len);
    ctx.lineTo(w1, len);
    ctx.quadraticCurveTo(w1 * 0.7, len * 0.5, w0, R * 0.05);
    ctx.closePath();
    ctx.fill();
  }
  function beam(len, base, alpha, coreAlpha) {
    // three nested layers: wide faint aura, mid glow, hot white core = soft ethereal jet
    cone(len, base * 1.7, base * 4.2, 90, 150, 255, alpha * 0.30);
    cone(len * 0.92, base * 0.9, base * 2.2, 150, 200, 255, alpha * 0.65);
    cone(len * 0.8, base * 0.32, base * 0.8, 255, 255, 255, coreAlpha);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const T = t / 1000;
    // pulsar beat: sharp-ish rise, soft decay, ~1.6s period (or steady when pulse off)
    const phase = (T % 1.6) / 1.6;
    const beat = opts.pulse ? Math.pow(Math.sin(Math.PI * phase), 3) : 0.55;
    const tilt = opts.tilt ? -0.48 : 0; // ~-27deg
    // constant tiny tremble
    const tx = Math.sin(T * 9.1) * 0.9 * DPR + Math.sin(T * 23.7) * 0.4 * DPR;
    const ty = Math.cos(T * 8.3) * 0.9 * DPR + Math.cos(T * 21.3) * 0.4 * DPR;

    ctx.save();
    ctx.translate(CX + tx, CY + ty);
    ctx.globalCompositeOperation = 'lighter';

    // ambient halo (breathes slowly + swells a touch on each beat); kept inside the
    // canvas so its edge never clips into a visible square
    const haloR = R * (2.3 + 0.12 * Math.sin(T * 1.7) + 0.22 * beat);
    let g = ctx.createRadialGradient(0, 0, R * 0.4, 0, 0, haloR);
    g.addColorStop(0, 'rgba(120,180,255,0.34)');
    g.addColorStop(0.45, 'rgba(90,140,255,0.13)');
    g.addColorStop(1, 'rgba(60,100,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(-W / 2, -H / 2, W, H);

    // polar jets, both poles, tilted axis. A constant baseline so they never vanish;
    // the beat swells length + brightness on top of it.
    if (opts.beams) {
      ctx.save();
      ctx.rotate(tilt);
      const len = R * (3.4 + 1.1 * beat);
      const base = R * (0.13 + 0.06 * beat);
      const a = 0.42 + 0.45 * beat;
      const ca = 0.5 + 0.5 * beat;
      beam(len, base, a, ca);          // south
      ctx.rotate(Math.PI);
      beam(len, base, a, ca);          // north
      ctx.restore();
    }

    // star body: layered plasma sphere (bright cyan, not dark at the edges)
    g = ctx.createRadialGradient(-R * 0.15, -R * 0.18, R * 0.05, 0, 0, R);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(215,240,255,0.98)');
    g.addColorStop(0.6, 'rgba(140,205,255,0.95)');
    g.addColorStop(0.85, 'rgba(80,155,255,0.75)');
    g.addColorStop(1, 'rgba(50,110,240,0.25)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();

    // rim light
    g = ctx.createRadialGradient(0, 0, R * 0.86, 0, 0, R * 1.05);
    g.addColorStop(0, 'rgba(140,200,255,0)');
    g.addColorStop(0.7, 'rgba(150,205,255,0.34)');
    g.addColorStop(1, 'rgba(140,200,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, R * 1.05, 0, Math.PI * 2); ctx.fill();

    // plasma filament web, clipped to the disc, slow rotation + flicker
    if (opts.filaments) {
      ctx.save();
      ctx.beginPath(); ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2); ctx.clip();
      ctx.rotate(T * 0.05);
      for (let i = 0; i < FIL.length; i++) {
        const f = FIL[i];
        const flick = 0.65 + 0.35 * Math.sin(T * 2.2 + i * 1.7);
        const x0 = Math.cos(f.a0) * f.r0 * R, y0 = Math.sin(f.a0) * f.r0 * R;
        const x1 = Math.cos(f.a1) * f.r1 * R, y1 = Math.sin(f.a1) * f.r1 * R;
        const mx = (x0 + x1) / 2 - (y1 - y0) * f.bow;
        const my = (y0 + y1) / 2 + (x1 - x0) * f.bow;
        ctx.strokeStyle = `rgba(225,245,255,${f.al * flick})`;
        ctx.lineWidth = f.w * DPR * 0.7;
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.quadraticCurveTo(mx, my, x1, y1); ctx.stroke();
      }
      ctx.restore();
    }

    // white-hot core flash on the beat
    g = ctx.createRadialGradient(0, 0, 0, 0, 0, R * 0.55);
    g.addColorStop(0, `rgba(255,255,255,${0.5 + 0.5 * beat})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, R * 0.55, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
